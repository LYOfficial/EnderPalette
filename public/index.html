<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnderPalette | 末地调色盘</title>
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/press-start-2p/1.0.0/press-start-2p.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a
      class="github-corner"
      href="https://github.com/LYOfficial/EnderPalette"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View source on GitHub"
    >
      <svg
        width="80"
        height="80"
        viewBox="0 0 250 250"
        aria-hidden="true"
      >
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
        <path
          class="octo-arm"
          d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
          fill="currentColor"
          style="transform-origin: 130px 106px"
        ></path>
        <path
          class="octo-body"
          d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.4 157.1,119.4 154.7,122.6 L141.0,136.2 C139.8,137.4 141.6,141.1 141.8,141.0 Z"
          fill="currentColor"
        ></path>
      </svg>
    </a>

    <div class="sky">
      <div class="glow"></div>
      <main class="app">
        <header class="hero">
          <div class="title">
            <h1>EnderPalette</h1>
            <p data-i18n="tagline">末地调色盘 · Minecraft 图像调色盘分析器</p>
          </div>
          <div class="status theme-switcher" aria-label="主题切换">
            <button
              class="theme-button pixel-block pixel-block--void"
              type="button"
              data-theme="obsidian"
              aria-label="黑曜石主题"
            ></button>
            <button
              class="theme-button pixel-block pixel-block--endstone"
              type="button"
              data-theme="endstone"
              aria-label="末地石主题"
            ></button>
            <button
              class="theme-button pixel-block pixel-block--purpur"
              type="button"
              data-theme="ender"
              aria-label="末影紫主题"
            ></button>
          </div>
        </header>

        <section class="workspace">
          <div class="column column-left">
            <div class="panel upload-panel">
              <div id="dropZone" class="drop-zone">
                <div class="drop-inner">
                  <h2 data-i18n="uploadTitle">上传图片</h2>
                  <p data-i18n="uploadDesc">把图片拖到这里，或点击选择。</p>
                  <button id="pickBtn" class="mc-button" data-i18n="chooseFile">
                    选择文件
                  </button>
                  <input id="fileInput" type="file" accept="image/*" hidden />
                </div>
              </div>
            </div>

            <div class="panel preview-panel">
              <div class="section">
                <h3 data-i18n="badgeSample">点击取色</h3>
                <div class="canvas-wrap">
                  <canvas id="mainCanvas" width="960" height="540"></canvas>
                  <canvas id="magnifier" width="140" height="140"></canvas>
                </div>
                <div class="zoom-controls">
                  <button
                    id="zoomOutBtn"
                    class="mc-button mc-button--ghost"
                    type="button"
                    data-i18n="zoomOut"
                  >
                    缩小
                  </button>
                  <input
                    id="zoomRange"
                    class="zoom-range"
                    type="range"
                    min="1"
                    max="8"
                    step="0.25"
                    value="1"
                  />
                  <button
                    id="zoomInBtn"
                    class="mc-button mc-button--ghost"
                    type="button"
                    data-i18n="zoomIn"
                  >
                    放大
                  </button>
                  <button
                    id="zoomResetBtn"
                    class="mc-button mc-button--ghost"
                    type="button"
                    data-i18n="zoomReset"
                  >
                    重置
                  </button>
                  <div class="zoom-readout">
                    <span data-i18n="zoomLabel">缩放</span>
                    <span id="zoomValue">100%</span>
                  </div>
                </div>
                <div class="hint" data-i18n="hint">点击画面任意位置分析颜色块。</div>
              </div>
            </div>

            <div class="panel inspector-panel">
              <div class="section">
                <h3 data-i18n="inspector">取色器</h3>
                <div class="inspector">
                  <div id="inspectSwatch" class="swatch"></div>
                  <div class="inspect-info">
                    <div id="inspectHex" class="mono">#000000</div>
                    <div id="inspectBlock" class="label" data-i18n="noMatch">暂无匹配</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="column column-right">
            <div class="panel edges-panel">
              <div class="section">
                <h3 data-i18n="edgeLines">边缘线条</h3>
                <div class="edge-frame">
                  <canvas id="edgeCanvas" width="320" height="180"></canvas>
                </div>
              </div>
            </div>

            <div class="panel matches-panel">
              <div class="section">
                <h3 data-i18n="blockMatches">方块匹配</h3>
                <div id="matches" class="matches"></div>
              </div>
            </div>
          </div>
        </section>
      </main>

    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
