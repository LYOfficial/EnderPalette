<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnderPalette | 末地调色盘</title>
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/press-start-2p/1.0.0/press-start-2p.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="sky">
      <div class="glow"></div>
      <main class="app">
        <header class="hero">
          <div class="title">
            <h1>EnderPalette</h1>
            <p data-i18n="tagline">末地调色盘 · Minecraft 图像调色盘分析器</p>
          </div>
          <div class="status">
            <div class="badge" data-i18n="badgeDrag">拖拽上传</div>
            <div class="badge" data-i18n="badgeSample">点击取色</div>
            <button
              id="langToggle"
              class="mc-button mc-button--ghost"
              type="button"
              data-i18n="langToggle"
            >
              切换语言
            </button>
          </div>
        </header>

        <section class="workspace">
          <div class="panel upload-panel">
            <div id="dropZone" class="drop-zone">
              <div class="drop-inner">
                <h2 data-i18n="uploadTitle">上传图片</h2>
                <p data-i18n="uploadDesc">把图片拖到这里，或点击选择。</p>
                <button id="pickBtn" class="mc-button" data-i18n="chooseFile">
                  选择文件
                </button>
                <input id="fileInput" type="file" accept="image/*" hidden />
              </div>
            </div>
            <div class="canvas-wrap">
              <canvas id="mainCanvas" width="960" height="540"></canvas>
              <canvas id="magnifier" width="140" height="140"></canvas>
            </div>
            <div class="hint" data-i18n="hint">点击画面任意位置分析颜色块。</div>
          </div>

          <div class="panel analysis-panel">
            <div class="section">
              <h3 data-i18n="inspector">取色器</h3>
              <div class="inspector">
                <div id="inspectSwatch" class="swatch"></div>
                <div class="inspect-info">
                  <div id="inspectHex" class="mono">#000000</div>
                  <div id="inspectBlock" class="label" data-i18n="noMatch">暂无匹配</div>
                </div>
              </div>
            </div>

            <div class="section">
              <h3 data-i18n="edgeLines">边缘线条</h3>
              <canvas id="edgeCanvas" width="320" height="180"></canvas>
            </div>

            <div class="section">
              <h3 data-i18n="blockMatches">方块匹配</h3>
              <div id="matches" class="matches"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
